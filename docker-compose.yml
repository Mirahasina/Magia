version: "3.9"

services:
  # ─── PostgreSQL Database (local dev only) ──────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: magia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: magia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: magia_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://postgres:postgres@db:5432/magia
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173"
      # AI Keys
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      # Email SMTP
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      # Stripe
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # Unipile
      UNIPILE_API_KEY: ${UNIPILE_API_KEY}
      UNIPILE_DSN: ${UNIPILE_DSN}
      # Daily.co
      DAILY_API_KEY: ${DAILY_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media

  # ─── WhatsApp Node.js Microservice ────────────────────────────────────────
  whatsapp:
    build:
      context: ./backend/whatsapp_service
      dockerfile: Dockerfile
    container_name: magia_whatsapp
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_BASE: "http://backend:8000/api"
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - whatsapp_auth:/app/auth_info_global

  # ─── React Frontend (dev mode only) ────────────────────────────────────────
  # In production, the frontend is deployed to Vercel — this service is for local dev.
  frontend:
    image: node:20-slim
    container_name: magia_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: "http://localhost:8000/api"
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
  whatsapp_auth:
  frontend_node_modules:
